<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip & Mind</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container header-init"> <!-- container делаю по центру, а header-init для флекса -->

            <div class="logo">Trip and Mind</div> <!-- логотипчик -->
            <nav class="nav">
                <a href="#gallery">Все туры</a>
                <a href="#contact">Контакты</a>
                <a href="#news">Новости</a>
            </nav>
        </div>
    </header>
    <!-- ================= MAIN ================= -->
    <main>
        <!-- ================= HERO ================= -->
        <section class="hero"></section> <!-- hero у меня это первый экранчик -->
        <div class="container hero-init">
            <!-- ===== ЛЕВАЯ ЧАСТЬ ===== -->
            <div class="hero-content">
                <h1>Открой для себя<br>новую Ирландию</h1>
                <p class="hero-text">Авторские туры по живописным уголкам от</p>
                <p class="hero-text-small">Макарончика</p>

                <!--КНОПОЧКИ-->
                <div class="hero-buttons">
                    <a href="#contact" class="btn-primary">Оставить заявку</a>
                    <a href="#" class="btn-video">
                        <span class="btt-video-circle">▶</span>
                        <span class="bty-video-text">Посмотреть видео<br>за прошлые года</span>
                    </a>
                </div>
            </div>
        </div>

    </main>





<script src="script.js"></script>
</body>

</html>
